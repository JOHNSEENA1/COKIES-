<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥷 𝐑𝐈𝐒𝐇𝐔 𝐗 𝐒𝐄𝐑𝐕𝐄𝐑 🥷👍 | HACK MODE</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0f0f;
    font-family: 'Courier New', 'Fira Code', monospace;
    color: #00ffcc;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(0deg, 
        rgba(0, 255, 204, 0.03) 0px, 
        rgba(0, 255, 204, 0.03) 2px,
        transparent 2px,
        transparent 6px);
    pointer-events: none;
    z-index: 0;
}

@keyframes scan {
    0% { top: -100%; }
    100% { top: 100%; }
}

.container {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

.card {
    background: rgba(10, 20, 20, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid #00ffcc;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    top: -100%;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, transparent, rgba(0, 255, 204, 0.1), transparent);
    animation: scan 4s linear infinite;
    pointer-events: none;
}

.card:hover {
    border-color: #ff00ff;
    box-shadow: 0 0 25px rgba(255, 0, 255, 0.3);
}

.card h2 {
    font-size: 1.1rem;
    margin-bottom: 15px;
    padding-bottom: 8px;
    border-bottom: 1px solid #00ffcc;
    letter-spacing: 2px;
    font-family: 'Courier New', monospace;
}

.monitor-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px dashed rgba(0, 255, 204, 0.3);
    font-family: 'Courier New', monospace;
}

.monitor-label {
    color: #ff00ff;
    font-weight: bold;
    letter-spacing: 1px;
}

label {
    display: block;
    margin-top: 12px;
    margin-bottom: 5px;
    font-size: 0.8rem;
    color: #00ffcc;
    text-transform: uppercase;
    letter-spacing: 1px;
}

input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    background: #0a1414;
    border: 1px solid #00ffcc;
    border-radius: 5px;
    color: #00ffcc;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    transition: all 0.3s;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #ff00ff;
    box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
}

textarea {
    resize: vertical;
    min-height: 80px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
}

button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
}

button:hover::before {
    left: 100%;
}

.green {
    background: linear-gradient(135deg, #006622, #00cc44);
    color: #000;
    text-shadow: 0 0 3px #00ff66;
    border: 1px solid #00ff66;
}

.red {
    background: linear-gradient(135deg, #990000, #ff0000);
    color: #fff;
    border: 1px solid #ff3300;
    font-weight: bold;
}

.hack-btn {
    background: linear-gradient(135deg, #1a0033, #330066);
    color: #ff00ff;
    border: 1px solid #ff00ff;
    margin-top: 8px;
}

.hack-btn:hover {
    background: linear-gradient(135deg, #330066, #1a0033);
    box-shadow: 0 0 15px #ff00ff;
}

.btn-group {
    display: flex;
    gap: 12px;
    margin-top: 15px;
}

.btn-group button {
    flex: 1;
    margin-top: 0;
}

#log {
    background: #050a0a;
    border: 1px solid #00ffcc;
    border-radius: 5px;
    height: 250px;
    overflow-y: auto;
    padding: 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #00ffcc;
    white-space: pre-wrap;
    word-break: break-all;
}

#log::-webkit-scrollbar {
    width: 5px;
}

#log::-webkit-scrollbar-track {
    background: #051010;
}

#log::-webkit-scrollbar-thumb {
    background: #00ffcc;
    border-radius: 3px;
}

.hidden {
    display: none;
}

.status-badge {
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: #000;
    border: 1px solid #00ffcc;
    padding: 4px 10px;
    font-size: 10px;
    z-index: 10;
    font-family: monospace;
}

.task-list {
    font-size: 11px;
    color: #ffaa00;
    word-break: break-all;
}

.close-btn {
    background: linear-gradient(135deg, #cc0000, #ff3300);
    font-size: 16px;
    padding: 14px;
}

.close-btn:hover {
    background: linear-gradient(135deg, #ff0000, #cc3300);
    box-shadow: 0 0 20px #ff0000;
}

@media (max-width: 600px) {
    body { padding: 10px; }
    .card { padding: 15px; }
    .btn-group { flex-direction: column; }
    .btn-group button { margin-top: 8px; }
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>🖥️ 𝐋𝐈𝐕𝐄 𝐌𝐎𝐍𝐈𝐓𝐎𝐑 [𝐇𝐀𝐂𝐊 𝐌𝐎𝐃𝐄] ⚡</h2>
<div class="monitor-item"><span class="monitor-label">🕒 UPTIME</span><span id="uptimeValue">0h 0m 0s</span></div>
<div class="monitor-item"><span class="monitor-label">🚀 ACTIVE TASKS</span><span id="activeTasks">0</span></div>
<div class="monitor-item"><span class="monitor-label">📋 TASK LIST</span><span id="taskList" class="task-list">None</span></div>
<div class="monitor-item"><span class="monitor-label">📨 MESSAGES SENT</span><span id="sent">0</span></div>
</div>

<div class="card">
<h2>💀 𝐒𝐓𝐀𝐑𝐓 𝐓𝐀𝐒𝐊 [𝐀𝐓𝐓𝐀𝐂𝐊 𝐌𝐎𝐃𝐄] 💀</h2>

<label>Cookie Input Method</label>
<select id="cookieMethod" onchange="toggleCookieInput()">
<option value="file">📁 Upload Cookie File</option>
<option value="paste">📋 Paste Cookies</option>
</select>

<div id="fileInputArea">
<label>📂 Cookie File (.txt)</label>
<input type="file" id="cookieFile" accept=".txt">
</div>

<div id="pasteInputArea" class="hidden">
<label>📝 Paste Cookies (Format: cookie1\ncookie2)</label>
<textarea id="cookieText" placeholder="Paste your cookies here..."></textarea>
</div>

<label>💬 SELECT MESSAGE SOURCE</label>
<div class="btn-group">
<button id="loadEmojiBtn" class="hack-btn">🤬 LOAD EMOJI NP FILE</button>
<button id="loadBotResponseBtn" class="hack-btn">🤖 LOAD BOT RESPONSE</button>
</div>

<label>📝 MESSAGE PREVIEW</label>
<textarea id="messageContent" placeholder="Click a button above to load message..." readonly></textarea>

<label>🎯 THREAD ID</label>
<input type="text" id="thread" placeholder="Enter thread/conversation ID">

<label>⏱️ DELAY (seconds)</label>
<input type="number" id="delay" value="10">

<label>😈 HATERS NAME</label>
<input type="text" id="haters" placeholder="Optional">

<label>👤 LAST NAME</label>
<input type="text" id="last" placeholder="Optional">

<button id="startBtn" class="green">🔥 EXECUTE TASK 🔥</button>
</div>

<div class="card">
<h2>🛑 TERMINATE TASK</h2>
<button id="closeCurrentTaskBtn" class="red close-btn">❌ CLOSE TASK</button>
</div>

<div class="card">
<h2>📜 SYSTEM LOG [LIVE]</h2>
<div id="log">[!] SYSTEM INITIALIZED...\n[!] SECURE CONNECTION ESTABLISHED\n[+] READY FOR COMMANDS\n</div>
</div>

</div>

<div class="status-badge">⚡ HACK MODE ACTIVE | v3.0</div>

<script>
let ws;
let currentMessageContent = "";
let activeTasksMap = new Map(); // Store {taskId: taskNumber}
let nextTaskNumber = 1;
const logBox = document.getElementById("log");

function log(msg) {
    const timestamp = new Date().toLocaleTimeString();
    logBox.innerHTML += `[${timestamp}] ${msg}\n`;
    logBox.scrollTop = logBox.scrollHeight;
}

function toggleCookieInput() {
    const m = document.getElementById("cookieMethod").value;
    document.getElementById("fileInputArea").classList.toggle("hidden", m !== "file");
    document.getElementById("pasteInputArea").classList.toggle("hidden", m !== "paste");
}

function updateTaskListDisplay() {
    const taskListSpan = document.getElementById("taskList");
    const activeCountSpan = document.getElementById("activeTasks");
    
    if (activeTasksMap.size === 0) {
        taskListSpan.textContent = "None";
        activeCountSpan.textContent = "0";
    } else {
        const taskNumbers = Array.from(activeTasksMap.values()).sort((a,b) => a-b);
        taskListSpan.textContent = "#" + taskNumbers.join(", #");
        activeCountSpan.textContent = activeTasksMap.size;
    }
}

// Function to fetch text file from GitHub with retry
async function fetchFromGitHub(url, logMessage, retryCount = 3) {
    let rawUrl = url;
    if (url.includes("github.com") && url.includes("/blob/")) {
        rawUrl = url.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
    }
    
    log(`[FETCH] ${logMessage}... (Attempt ${4-retryCount}/3)`);
    
    for (let attempt = 1; attempt <= retryCount; attempt++) {
        try {
            const response = await fetch(rawUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            currentMessageContent = text;
            
            // Show preview
            const previewText = text.length > 500 ? text.substring(0, 500) + "\n... [FULL FILE LOADED - " + text.length + " characters]" : text;
            document.getElementById("messageContent").value = previewText;
            
            log(`[SUCCESS] ${logMessage} loaded completely! (${text.length} characters, ${text.split(/\r?\n/).length} lines)`);
            return text;
        } catch (error) {
            log(`[WARN] Attempt ${attempt} failed: ${error.message}`);
            if (attempt === retryCount) {
                log(`[ERROR] Failed to load ${logMessage} after ${retryCount} attempts`);
                alert(`Failed to load: ${logMessage}\nCheck URL or internet connection.`);
                return null;
            }
            await new Promise(resolve => setTimeout(resolve, 1000));
        }
    }
    return null;
}

// Button handlers
document.getElementById("loadEmojiBtn").onclick = () => {
    const url = "https://raw.githubusercontent.com/JOHNSEENA1/Cokies-4-GROUP-/main/Emoji%20NP%20File.txt";
    fetchFromGitHub(url, "Emoji NP File");
};

document.getElementById("loadBotResponseBtn").onclick = () => {
    const url = "https://raw.githubusercontent.com/JOHNSEENA1/Cokies-4-GROUP-/main/bot_response_text.txt";
    fetchFromGitHub(url, "Bot Response Text");
};

/* ================= WEBSOCKET CONNECTION ================= */

function connect() {
    ws = new WebSocket(
        (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws"
    );

    ws.onopen = () => log("[CONNECT] ✅ Connected to Server");

    ws.onclose = () => {
        log("[CONNECT] ⚠️ Connection Lost, reconnecting in 3s...");
        setTimeout(connect, 3000);
    };

    ws.onerror = () => log("[CONNECT] ❌ WebSocket Error!");

    ws.onmessage = (e) => {
        let d;
        try { d = JSON.parse(e.data); } catch { return; }

        if (d.type === "log") log(d.message);

        if (d.type === "task_started") {
            const taskNumber = nextTaskNumber++;
            activeTasksMap.set(d.taskId, taskNumber);
            updateTaskListDisplay();
            log(`[TASK] 🚀 Task #${taskNumber} started`);
        }

        if (d.type === "stopped") {
            const taskNumber = activeTasksMap.get(d.taskId);
            if (taskNumber) {
                activeTasksMap.delete(d.taskId);
                updateTaskListDisplay();
                log(`[TASK] ⏹ Task #${taskNumber} stopped`);
            } else {
                log(`[TASK] ⏹ Task stopped`);
            }
        }
        
        if (d.type === "monitor_data") {
            const totalSeconds = d.uptime;
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            document.getElementById("uptimeValue").textContent = `${hours}h ${minutes}m ${seconds}s`;
            document.getElementById("sent").textContent = d.totalSent;
        }
    };
}

setInterval(() => {
    if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: "ping" }));
    }
}, 25000);

setInterval(() => {
    if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: "monitor" }));
    }
}, 2000);

/* ================= START TASK LOGIC ================= */

document.getElementById("startBtn").onclick = () => {
    const threadInput = document.getElementById("thread");
    const delayInput = document.getElementById("delay");
    const hatersInput = document.getElementById("haters");
    const lastInput = document.getElementById("last");

    if (!currentMessageContent) {
        alert("⚠️ Please load a message file first!");
        log("[ERROR] No message loaded. Click 'LOAD EMOJI NP FILE' or 'LOAD BOT RESPONSE' first.");
        return;
    }

    if (!threadInput.value.trim()) {
        alert("⚠️ Please enter a Thread ID!");
        log("[ERROR] Thread ID missing.");
        return;
    }

    const method = document.getElementById("cookieMethod").value;

    const sendTask = (cookies) => {
        if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({
                type: "start",
                cookieContent: cookies,
                messageContent: currentMessageContent,
                threadID: threadInput.value,
                delay: delayInput.value,
                hatersName: hatersInput.value,
                lastHereName: lastInput.value
            }));
            log("[TASK] ⏳ Sending task request to server...");
        } else {
            log("[ERROR] WebSocket not connected!");
            alert("WebSocket not connected!");
        }
    };

    if (method === "file") {
        const f = document.getElementById("cookieFile").files[0];
        if (!f) {
            alert("⚠️ Please upload a cookie file");
            log("[ERROR] No cookie file selected.");
            return;
        }
        const r = new FileReader();
        r.onload = e => sendTask(e.target.result);
        r.onerror = () => log("[ERROR] Failed to read cookie file.");
        r.readAsText(f);
    } else {
        const pText = document.getElementById("cookieText").value;
        if (!pText.trim()) {
            alert("⚠️ Please paste cookies");
            log("[ERROR] No cookies pasted.");
            return;
        }
        sendTask(pText);
    }
};

/* ================= CLOSE TASK BUTTON (No ID needed) ================= */

document.getElementById("closeCurrentTaskBtn").onclick = () => {
    if (activeTasksMap.size === 0) {
        log("[TASK] ⚠️ No active task to close!");
        alert("⚠️ No task is currently running. Start a task first!");
        return;
    }
    
    // Get the most recent task (largest task number)
    let latestTaskId = null;
    let latestTaskNumber = -1;
    
    for (const [taskId, taskNumber] of activeTasksMap) {
        if (taskNumber > latestTaskNumber) {
            latestTaskNumber = taskNumber;
            latestTaskId = taskId;
        }
    }
    
    if (latestTaskId && ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: "stop_by_id", taskId: latestTaskId }));
        log(`[TASK] ❌ Closing Task #${latestTaskNumber}...`);
    } else if (ws && ws.readyState !== 1) {
        log("[ERROR] WebSocket not connected.");
        alert("WebSocket not connected!");
    }
};

// Initialize
toggleCookieInput();
connect();
log("[SYSTEM] ✅ Ready! Load a message file using the buttons above.");
log("[SYSTEM] 🔥 Tasks will be numbered automatically (Task #1, #2, #3...)");
log("[SYSTEM] ❌ Click 'CLOSE TASK' to stop the most recent task (No ID needed)");
</script>
</body>
</html>
